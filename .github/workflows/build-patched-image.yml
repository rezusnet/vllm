name: Build Patched vLLM Image

on:
  push:
    branches:
      - fix/*
  workflow_dispatch:
    inputs:
      base_image:
        description: "Base vLLM image to patch (image:tag or image@sha256:digest)"
        required: false
        default: "vllm/vllm-openai:nightly"
      dockerfile:
        description: "Dockerfile to use (relative to repo root)"
        required: false
        default: "docker/Dockerfile.patched"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rezusnet/vllm-openai

jobs:
  build-and-push:
    name: Build Patched Image (x86_64)
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve configuration
        id: config
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BRANCH_NAME="${GITHUB_REF_NAME:-manual}"

          {
            echo "short_sha=${SHORT_SHA}"
            echo "branch_name=${BRANCH_NAME}"
          } >> "$GITHUB_OUTPUT"

          BASE="${{ inputs.base_image || 'vllm/vllm-openai:nightly' }}"
          echo "base_image=${BASE}" >> "$GITHUB_OUTPUT"
          echo "Base image: ${BASE}"

          DOCKERFILE="${{ inputs.dockerfile || 'docker/Dockerfile.patched' }}"
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "Dockerfile: ${DOCKERFILE}"

          BRANCH_TAG="$(echo "${BRANCH_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-80)"
          echo "branch_tag=patched-${BRANCH_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=${{ steps.config.outputs.branch_tag }}
            type=raw,value=latest

      - name: Build and push patched image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.config.outputs.base_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        if: always()
        run: |
          echo "Patched image built from base: ${{ steps.config.outputs.base_image }}"
          echo "Tags applied: ${{ steps.meta.outputs.tags }}"
